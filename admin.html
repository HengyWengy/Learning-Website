<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnGate Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="LearnGate student portal">
          <span class="brand-mark">LG</span>
          <span class="brand-copy">
            <strong>LearnGate Admin</strong>
            <small>Private code dashboard</small>
          </span>
        </a>

        <div class="header-actions">
          <a class="secondary-link" href="/">Student site</a>
          <button id="logoutButton" class="quiet-button" type="button" hidden>Logout</button>
        </div>
      </header>

      <main class="admin-layout">
        <section id="adminLogin" class="access-panel admin-login" aria-labelledby="adminTitle">
          <p class="eyebrow">Teacher only</p>
          <h1 id="adminTitle">Admin access</h1>
          <p class="lead">Enter your admin password to view private class codes and participant progress.</p>

          <form id="adminLoginForm" class="access-form">
            <label for="adminPassword">Admin password</label>
            <div class="code-row">
              <input id="adminPassword" name="adminPassword" type="password" autocomplete="current-password" required />
              <button type="submit">Open</button>
            </div>
            <p id="loginMessage" class="form-message" role="alert" aria-live="polite"></p>
          </form>
        </section>

        <section id="adminDashboard" hidden>
          <section class="admin-hero">
            <div class="access-card admin-code-card">
              <span>Current class entry code</span>
              <strong id="entryCodeDisplay">Loading</strong>
              <small>Give this code to students who should enter the course.</small>
            </div>

            <div class="admin-actions">
              <button id="refreshButton" class="quiet-button" type="button">Refresh</button>
              <button id="regenerateEntryButton" class="quiet-button danger-button" type="button">New entry code</button>
            </div>
          </section>

          <section class="admin-grid">
            <article class="admin-panel">
              <div class="preview-heading">
                <span>Participants</span>
                <strong id="participantCount">0 active</strong>
              </div>
              <div id="participantList" class="participant-list"></div>
            </article>

            <article class="admin-panel">
              <div class="preview-heading">
                <span>Course</span>
                <strong id="courseCount">0 videos</strong>
              </div>
              <div id="courseList" class="lesson-list"></div>
            </article>
          </section>
        </section>
      </main>
    </div>

    <script src="admin.js" defer></script>
  </body>
</html>
